<section class="skills" id="skills">
  <div class="container">
    <div class="section-header">
      <span class="section-label">Skills</span>
      <h2 class="section-title">Technical &amp; Professional Toolkit</h2>
    </div>

    <div class="skills-grid">
      @for (group of skills; track group.category) {
        <div class="skill-category">
          <h3 class="category-name">{{ group.category }}</h3>
          <div class="skill-tags">
            @for (skill of group.items; track skill) {
              <span class="skill-tag">{{ skill }}</span>
            }
          </div>
        </div>
      }
    </div>

    <div class="soft-skills">
      <h3 class="soft-skills-title">Soft Skills</h3>
      <div class="soft-skills-list">
        @for (skill of softSkills; track skill) {
          <span class="soft-skill-item">{{ skill }}</span>
        }
      </div>
    </div>
  </div>
</section>
